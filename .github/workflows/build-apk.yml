name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Restore cached keystore
        uses: actions/cache@v4
        id: keystore-cache
        with:
          path: app/keystore/bigs-pos.jks
          key: bigs-pos-keystore-v1

      - name: Generate keystore if not cached
        if: steps.keystore-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p app/keystore
          keytool -genkeypair -v \
            -keystore app/keystore/bigs-pos.jks \
            -alias bigspos \
            -keyalg RSA -keysize 2048 \
            -validity 36500 \
            -storepass bigspos2026 \
            -keypass bigspos2026 \
            -dname "CN=BigsPOS,OU=Dev,O=RGBPos,L=Manila,S=NCR,C=PH"

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Build Release APK
        run: gradle assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: bigs-pos-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: bigs-pos-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90
